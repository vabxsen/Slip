name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'client/**'
      - 'shared/**'
      - '.github/workflows/build-android.yml'
  workflow_dispatch: {}

# Avoid two builds racing to publish the same "latest" release.
concurrency:
  group: build-android
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Capacitor 8's CLI requires Node >=22 (the rest of the repo only
          # needs >=20.19 — this workflow just uses the newer version).
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        working-directory: client
        env:
          VITE_SERVER_URL: ${{ secrets.VITE_SERVER_URL }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
        run: npm run build

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK platform
        run: sdkmanager --install "platforms;android-36" "platform-tools"

      - name: Sync Capacitor native project
        working-directory: client
        run: npx cap sync android

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('client/android/**/*.gradle*') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build debug APK
        working-directory: client/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Publish latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          body: >
            Automatically built from the latest push to main. This is a
            debug build meant for sideloading — you'll need to enable
            "install from unknown sources" for your browser/file manager.
          make_latest: true
          files: client/android/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
