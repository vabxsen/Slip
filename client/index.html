<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="The easiest way to transfer files between any device." />
    <meta name="theme-color" content="#0b57d0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Slip" />
    <title>Slip</title>
    <style>
      /*
        Paints instantly, before any JS loads — closes the gap between the
        native app-launch splash (icon on black, see manifest.background_color)
        and React mounting, which otherwise briefly flashes the browser's
        default white background. Cleared automatically the moment React
        renders into #root, since that replaces this markup entirely.
      */
      html,
      body {
        background: #000;
      }
      #preboot {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
      }
      #preboot span {
        width: 32px;
        height: 32px;
        border: 3px solid rgba(255, 255, 255, 0.2);
        border-top-color: #fff;
        border-radius: 50%;
        animation: preboot-spin 0.8s linear infinite;
      }
      @keyframes preboot-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="preboot"><span></span></div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
